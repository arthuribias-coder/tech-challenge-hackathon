<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}STRIDE Threat Modeler{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <!-- highlight.js para blocos de código no chat -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="navbar">
      <div class="container navbar__inner">
        <a href="/" class="navbar__brand">
          <span class="navbar__icon">&#128737;</span>
          <span>STRIDE Threat Modeler</span>
        </a>
        <nav class="navbar__links">
          <a href="/analysis/" class="{% block nav_analysis %}{% endblock %}">Nova Análise</a>
          <a href="/chat/"     class="{% block nav_chat %}{% endblock %}">Chat STRIDE</a>
          <a href="/health" target="_blank">Status</a>
        </nav>
      </div>
    </header>

    <main class="container main-content">{% block content %}{% endblock %}</main>

    <footer class="footer">
      <div class="container">
        <p>FIAP &mdash; Tech Challenge Fase 5 &mdash; Hackathon 2025</p>
      </div>
    </footer>

    <!-- CDN libs -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
